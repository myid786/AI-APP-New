name: Build Docker images to ACR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Backend/common-lib/**
      - Backend/single-backend/**
      - FrontEnd/**
      - .github/workflows/azure-docker-images.yml

env:
  ACR_LOGIN_SERVER: aimediaacr786.azurecr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: aimedia-single-backend
            context: .
            dockerfile: Backend/single-backend/Dockerfile
          - image: aimedia-frontend
            context: FrontEnd
            dockerfile: FrontEnd/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=https://ai-media-gateway-786.azurewebsites.net
