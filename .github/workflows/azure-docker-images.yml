name: Build Docker images to ACR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Backend/**
      - FrontEnd/**
      - .github/workflows/azure-docker-images.yml

env:
  ACR_LOGIN_SERVER: aimediaacr786.azurecr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: aimedia-discovery-service
            context: Backend
            dockerfile: Backend/discovery-service/Dockerfile
          - image: aimedia-auth-service
            context: Backend
            dockerfile: Backend/auth-service/Dockerfile
          - image: aimedia-user-service
            context: Backend
            dockerfile: Backend/user-service/Dockerfile
          - image: aimedia-post-service
            context: Backend
            dockerfile: Backend/post-service/Dockerfile
          - image: aimedia-interaction-service
            context: Backend
            dockerfile: Backend/interaction-service/Dockerfile
          - image: aimedia-media-service
            context: Backend
            dockerfile: Backend/media-service/Dockerfile
          - image: aimedia-ai-service
            context: Backend
            dockerfile: Backend/ai-service/Dockerfile
          - image: aimedia-api-gateway
            context: Backend
            dockerfile: Backend/api-gateway/Dockerfile
          - image: aimedia-frontend
            context: FrontEnd
            dockerfile: FrontEnd/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=https://ai-media-gateway-786.azurewebsites.net
