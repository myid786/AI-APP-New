name: Build and deploy single backend container

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Backend/common-lib/**
      - Backend/single-backend/**
      - FrontEnd/**
      - .github/workflows/azure-production-containers.yml

env:
  RESOURCE_GROUP: rg-ai-media-platform
  BACKEND_APP: ai-media-gateway-786
  STORAGE_ACCOUNT: aiappmedia786
  ACR_LOGIN_SERVER: aimediaacr786.azurecr.io
  BACKEND_IMAGE: aimedia-single-backend
  FRONTEND_API_BASE_URL: https://ai-media-gateway-786.azurewebsites.net

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8D69C04BCA41433998FE7A46F10BF091 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9CC48BF9F1F8454AB187E1692B06B7B1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBE10EE1585D47AABA818F2698A41B54 }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Backend/single-backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deploy backend container
        run: |
          az webapp config container set \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.BACKEND_APP }}" \
            --container-image-name "${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}" \
            --container-registry-url "https://${{ env.ACR_LOGIN_SERVER }}" \
            --container-registry-user "${{ secrets.ACR_USERNAME }}" \
            --container-registry-password "${{ secrets.ACR_PASSWORD }}"
          az webapp restart \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.BACKEND_APP }}"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Build frontend
        working-directory: FrontEnd
        run: |
          npm ci
          VITE_API_BASE_URL=${{ env.FRONTEND_API_BASE_URL }} npm run build

      - name: Upload frontend to Azure Static Website
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob service-properties update \
              --account-name "${{ env.STORAGE_ACCOUNT }}" \
              --static-website \
              --index-document index.html \
              --404-document index.html \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
            az storage blob upload-batch \
              --destination '$web' \
              --source FrontEnd/dist \
              --overwrite \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
