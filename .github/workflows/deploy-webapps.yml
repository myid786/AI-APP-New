name: Deploy Containers to Azure Web Apps

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push Docker Images to ACR"]
    types: [completed]

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  TAG: latest

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: discovery-service
            app_name: ${{ secrets.AZURE_WEBAPP_DISCOVERY }}
            publish_profile: AZURE_WEBAPP_PUBLISH_PROFILE_DISCOVERY
          - image: auth-service
            app_name: ${{ secrets.AZURE_WEBAPP_AUTH }}
            publish_profile: AZURE_WEBAPP_PUBLISH_PROFILE_AUTH
          - image: user-service
            app_name: ${{ secrets.AZURE_WEBAPP_USER }}
            publish_profile: AZURE_WEBAPP_PUBLISH_PROFILE_USER
          - image: post-service
            app_name: ${{ secrets.AZURE_WEBAPP_POST }}
            publish_profile: AZURE_WEBAPP_PUBLISH_PROFILE_POST
          - image: interaction-service
            app_name: ${{ secrets.AZURE_WEBAPP_INTERACTION }}
            publish_profile: AZURE_WEBAPP_PUBLISH_PROFILE_INTERACTION
          - image: media-service
            app_name: ${{ secrets.AZURE_WEBAPP_MEDIA }}
            publish_profile: AZURE_WEBAPP_PUBLISH_PROFILE_MEDIA
          - image: ai-service
            app_name: ${{ secrets.AZURE_WEBAPP_AI }}
            publish_profile: AZURE_WEBAPP_PUBLISH_PROFILE_AI
          - image: api-gateway
            app_name: ${{ secrets.AZURE_WEBAPP_GATEWAY }}
            publish_profile: AZURE_WEBAPP_PUBLISH_PROFILE_GATEWAY
          - image: frontend
            app_name: ${{ secrets.AZURE_WEBAPP_FRONTEND }}
            publish_profile: AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND

    steps:
      - name: Deploy container image
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app_name }}
          publish-profile: ${{ secrets[matrix.publish_profile] }}
          images: ${{ env.REGISTRY }}/${{ matrix.image }}:${{ env.TAG }}
