server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-media-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_media_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:500MB}
      max-request-size: ${MAX_REQUEST_SIZE:500MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-for-local-development-only-12345678901234567890}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  upload-dir: ${UPLOAD_DIR:/app/uploads}
  media-base-url: ${MEDIA_BASE_URL:http://localhost:8080/uploads}
  azure-storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
    container: ${AZURE_STORAGE_CONTAINER:media}
